    /* 統一圖片框大小與裁切 */
    .img-frame {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 0.75rem;
      cursor: zoom-in;
      transition: transform 0.3s ease;
    }
    
    .img-frame:hover {

    }

    /* 網格收摺動畫 */
    .grid-container { 
      transition: max-height 0.5s ease-in-out; 
      overflow: hidden; 
    }
    
    .rotate-180 {

    }

  <script>
    // ====== 主題切換 ======
    const themeBtn = document.getElementById("themeToggle");
    function setTheme(dark) {
      if (dark) {
        document.documentElement.classList.add("dark");
        themeBtn.textContent = "☀️";
        localStorage.setItem("theme", "dark");
      } else {
        document.documentElement.classList.remove("dark");
        themeBtn.textContent = "🌙";
        localStorage.setItem("theme", "light");
      }
    }
    setTheme(localStorage.getItem("theme") === "dark");
    themeBtn.addEventListener("click", () => {
      setTheme(!document.documentElement.classList.contains("dark"));
    });

    // ====== 語言切換 ======
    const langBtn = document.getElementById("langToggle");
    function setLang(lang) {
      if (lang === "zh") {
        langBtn.textContent = "EN";
        document.querySelectorAll(".lang").forEach(el => {
          if (el.dataset.zh) el.textContent = el.dataset.zh;
        });
        localStorage.setItem("lang", "zh");
      } else {
        langBtn.textContent = "中文";
        document.querySelectorAll(".lang").forEach(el => {
          if (el.dataset.en) el.textContent = el.dataset.en;
        });
        localStorage.setItem("lang", "en");
      }
    }
    setLang(localStorage.getItem("lang") || "zh");
    
    langBtn.addEventListener("click", () => {
      const current = localStorage.getItem("lang") || "zh";
      const newLang = current === "zh" ? "en" : "zh";
      setLang(newLang);

      document.querySelectorAll('.toggle-btn').forEach(btn => {
        const toggleText = btn.querySelector('.toggle-text');
        const section = btn.closest('section');
        const gridContainer = section.querySelector('.grid-container');
        const isExpanded = gridContainer.style.maxHeight !== '0px' && gridContainer.style.maxHeight !== '';

        if (toggleText) {
          toggleText.textContent = (newLang === 'en') ? (isExpanded ? 'Collapse' : 'Expand All') : (isExpanded ? '收起' : '展開所有');
        }
      });
    });

    // ====== 網格展開與收摺功能 ======
    document.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const section = btn.closest('section');
        const gridContainer = section.querySelector('.grid-container');
        const arrowIcon = btn.querySelector('.arrow-icon');
        const toggleText = btn.querySelector('.toggle-text');
        const currentLang = localStorage.getItem('lang') || 'zh';

        if (gridContainer.style.maxHeight === '0px' || gridContainer.style.maxHeight === '') {
          gridContainer.style.maxHeight = '1000px';
          gridContainer.classList.remove('opacity-0');
          gridContainer.classList.add('opacity-100');
          toggleText.textContent = (currentLang === 'en') ? 'Collapse' : '收起';
          if (arrowIcon) arrowIcon.classList.add('rotate-180');
        } else {
          gridContainer.style.maxHeight = '0px';
          gridContainer.classList.remove('opacity-100');
          gridContainer.classList.add('opacity-0');
          toggleText.textContent = (currentLang === 'en') ? 'Expand All' : '展開所有';
          if (arrowIcon) arrowIcon.classList.remove('rotate-180');
        }
      });
    });

    // ====== 燈箱功能 ======
    const lightbox = document.getElementById('image-lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const images = document.querySelectorAll('.img-frame');

    images.forEach(img => {
      if (img.id === "lightbox-img") return;
      img.addEventListener('click', () => {
        lightboxImg.src = img.src;
        lightbox.classList.remove('hidden');
        setTimeout(() => {
          lightbox.classList.remove('opacity-0');
          lightboxImg.classList.remove('scale-90');
        }, 10);
        document.body.style.overflow = 'hidden';
      });
    });

    lightbox.addEventListener('click', () => {
      lightbox.classList.add('opacity-0');
      lightboxImg.classList.add('scale-90');
      setTimeout(() => {
        lightbox.classList.add('hidden');
        document.body.style.overflow = 'auto';
      }, 300);
    });
  </script>
