  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
        // 切換 Grid 與 Swiper 顯示
        document.querySelectorAll('.toggle-grid').forEach(btn => {
        btn.addEventListener('click', () => {
            const section = btn.closest('section');
            const swiper = section.querySelector('.swiper');
            const grid = section.querySelector('.grid-view');

            const isOpen = !grid.classList.contains('hidden');

            if (isOpen) {
            grid.classList.add('hidden');
            swiper.classList.remove('hidden');
            btn.classList.remove('open');
            } else {
            grid.classList.remove('hidden');
            swiper.classList.add('hidden');
            btn.classList.add('open');
            }
        });
        });

    // 初始化所有輪播
    const swiperOptions = {
      slidesPerView: 1,
      spaceBetween: 20,
      loop: true,
      navigation: {
        nextEl: '.swiper-button-next',
        prevEl: '.swiper-button-prev',
      },
      breakpoints: {
        640: { slidesPerView: 2 },
        1024: { slidesPerView: 3 }
      }
    };

    new Swiper('.charSwiper', swiperOptions);
    new Swiper('.visualSwiper', swiperOptions);
    new Swiper('.storySwiper', swiperOptions);
    new Swiper('.landSwiper', swiperOptions);
  </script>
