<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幕後花絮 - 光與塵</title>
  <link rel="icon" type="image/svg+xml" href="webpic/Icon_color.svg">
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @custom-variant dark (&:where(.dark, .dark *));
  </style>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans TC', ui-sans-serif, system-ui, sans-serif;
    }

    /* 燈箱與圖片手勢 */
    section img, .grid-img { cursor: zoom-in; transition: transform 0.3s ease; }
    section img:hover, .grid-img:hover { filter: brightness(1.05); }
    .overflow-hidden { overflow: hidden; }
    /* 網格收摺動畫 */
    #grid-container { transition: max-height 0.5s ease-in-out; overflow: hidden; }
    .rotate-180 { transform: rotate(180deg); }
  </style>
</head>
<body class="bg-white text-stone-900 dark:bg-mauve-800 dark:text-zinc-100 transition-colors duration-300">

  <header class="fixed top-0 w-full z-50 bg-stone-50/80 dark:bg-taupe-900/80 backdrop-blur-md shadow-sm transition-colors duration-300">
    <nav class="max-w-7xl mx-auto px-6 flex justify-between items-center h-16 md:h-20">
      <a href="LightDust-gallery-new.html" class="text-amber-600 dark:text-purple-400 font-bold lang" data-zh="← 返回設定集" data-en="← Back to Gallery">← 返回設定集</a>
      
      <h1 class="font-bold lang text-lg md:text-xl" data-zh="幕後花絮" data-en="Behind the Scenes">幕後花絮</h1>
      
      <div class="flex space-x-3 items-center">
        <button id="langToggle" class="px-2 py-1 rounded text-white transition-colors bg-amber-600 hover:bg-amber-700 dark:bg-purple-600 dark:hover:bg-purple-500">
          EN
        </button>
        
        <button id="themeToggle" class="px-2 py-1 rounded transition-colors bg-stone-200 hover:bg-stone-300 dark:bg-zinc-700 dark:hover:bg-zinc-600 dark:text-zinc-200">
          ☀️
        </button>
      </div>
    </nav>
  </header>

  <main class="pt-20 pb-12">
    <section class="max-w-4xl mx-auto px-6 py-10 text-center">
      <h2 class="text-4xl md:text-5xl font-bold text-stone-800 dark:text-white mb-4 lang" data-zh="幕後花絮" data-en="Behind the Scenes">
        幕後花絮
      </h2>
      <div class="w-20 h-1 bg-amber-600 dark:bg-purple-600 mx-auto rounded-full mb-6"></div>
      <p class="text-stone-500 dark:text-stone-400 lang" data-zh="創作歷程與點滴" data-en="Behind the Scenes">
        Behind the Scenes
      </p>
    </section>

    <section class="max-w-4xl mx-auto px-6 py-10 text-center">
      <div class="space-y-4 text-stone-600 dark:text-zinc-300 leading-relaxed">
        <p class="lang" data-zh="《光與塵》的誕生，並非一蹴而就。從最初的世界觀設定、角色關係的反覆推敲，到視覺風格的嘗試與修正，每一個階段都留下了大量未被看見的思考與取捨。" data-en="The birth of 'Light and Dust' was not achieved overnight. From the initial world-building and repeated refinement of character relationships to the trial and error of visual styles, each stage left behind a wealth of unseen thought and compromise.">
          《光與塵》的誕生，並非一蹴而就。從最初的世界觀設定、角色關係的反覆推敲，
          到視覺風格的嘗試與修正，每一個階段都留下了大量未被看見的思考與取捨。
        </p>

        <p class="lang" data-zh="這些幕後片段記錄了創作過程中的迷惘、修正與突破，也是作品逐漸成形的重要痕跡。它們並非最終成果，卻構成了世界真正誕生的軌跡。" data-en="These behind-the-scenes clips record the confusion, revisions, and breakthroughs during the creative process, as well as the important traces of the work taking shape. They are not the final result, but rather the trajectory of how the world was truly born.">
          這些幕後片段記錄了創作過程中的迷惘、修正與突破，
          也是作品逐漸成形的重要痕跡。它們並非最終成果，
          卻構成了世界真正誕生的軌跡。
        </p>
      </div>

      <div class="mt-8 flex justify-center">
        <img 
          src="webpic/8.png" 
          alt="幕後花絮示意" 
          class="max-w-full max-h-[70vh] rounded-xl shadow-lg object-contain mx-auto"
        >
      </div>
    </section>
  </main>

  <div id="image-lightbox" class="fixed inset-0 z-[100] hidden bg-black/90 flex items-center justify-center cursor-zoom-out opacity-0 transition-opacity duration-300">
    <img id="lightbox-img" src="" class="max-w-[90%] max-h-[90%] object-contain rounded-lg scale-90 transition-transform duration-300">
    <button class="absolute top-8 right-8 text-white text-4xl">&times;</button>
  </div>

  <footer class="bg-stone-200 dark:bg-mauve-900 py-8 mt-auto transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center text-stone-700 dark:text-zinc-300 space-y-4 md:space-y-0">
      <div class="text-center md:text-left">
        <h4 class="font-bold mb-2 lang" data-zh="《光與塵》" data-en="Light and Dust">《光與塵》</h4>
        <p class="text-sm lang" data-zh="這是一部動畫的官方網站" data-en="This is the official website of the animation">這是一部動畫的官方網站</p>
      </div>
      <div class="text-center md:text-right text-sm space-y-1">
        <div class="contact-info space-x-2">
          <span><i class="fa-solid fa-phone"></i> 07-591-9000</span>
          <span><i class="fa-solid fa-envelope"></i> mail@nuk.edu.tw</span>
        </div>
        <div class="mt-1">
          <i class="fa-solid fa-location-dot"></i> 811 高雄市楠梓區高雄大學路700號
        </div>
        <div class="copyright text-secondary mt-2 text-xs text-stone-500 dark:text-zinc-500">
          Copyright © 2026 《光與塵》. All Rights Reserved.
        </div>
      </div>
    </div>
  </footer>

  <script>
    // ====== 主題切換 ======
    const themeBtn = document.getElementById("themeToggle");
    function setTheme(dark) {
      if (dark) {
        document.documentElement.classList.add("dark");
        themeBtn.textContent = "☀️";
        localStorage.setItem("theme", "dark");
      } else {
        document.documentElement.classList.remove("dark");
        themeBtn.textContent = "🌙";
        localStorage.setItem("theme", "light");
      }
    }
    setTheme(localStorage.getItem("theme") === "dark");
    themeBtn.addEventListener("click", () => {
      setTheme(!document.documentElement.classList.contains("dark"));
    });

    // ====== 語言切換 ======
    const langBtn = document.getElementById("langToggle");
    function setLang(lang) {
      if (lang === "zh") {
        langBtn.textContent = "EN";
        document.querySelectorAll(".lang").forEach(el => {
          el.textContent = el.dataset.zh;
        });
        document.querySelectorAll(".lang-zh").forEach(el => el.classList.remove("hidden"));
        document.querySelectorAll(".lang-en").forEach(el => el.classList.add("hidden"));
        localStorage.setItem("lang", "zh");
      } else {
        langBtn.textContent = "中文";
        document.querySelectorAll(".lang").forEach(el => {
          el.textContent = el.dataset.en;
        });
        document.querySelectorAll(".lang-zh").forEach(el => el.classList.add("hidden"));
        document.querySelectorAll(".lang-en").forEach(el => el.classList.remove("hidden"));
        localStorage.setItem("lang", "en");
      }
    }
    setLang(localStorage.getItem("lang") || "zh");
    langBtn.addEventListener("click", () => {
      const current = localStorage.getItem("lang") || "zh";
      setLang(current === "zh" ? "en" : "zh");
    });

    // ====== 燈箱功能 ======
    const lightbox = document.getElementById('image-lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const images = document.querySelectorAll('section img, .grid-img'); 

    images.forEach(img => {
      if(img.id === "lightbox-img") return;
      img.addEventListener('click', () => {
        lightboxImg.src = img.src;
        lightbox.classList.remove('hidden');
        setTimeout(() => {
          lightbox.classList.remove('opacity-0');
          lightboxImg.classList.remove('scale-90');
        }, 10);
        document.body.style.overflow = 'hidden';
      });
    });

    lightbox.addEventListener('click', () => {
      lightbox.classList.add('opacity-0');
      lightboxImg.classList.add('scale-90');
      setTimeout(() => {
        lightbox.classList.add('hidden');
        document.body.style.overflow = 'auto';
      }, 300);
    });
  </script>
</body>
</html>
