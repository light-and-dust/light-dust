  <!-- JavaScript -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const lightbox = document.getElementById('image-lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      const images = document.querySelectorAll('section img');

      // 開啟燈箱
      images.forEach(img => {
        img.addEventListener('click', () => {
          const src = img.getAttribute('src');
          lightboxImg.src = src;
          
          // 顯示燈箱並加入動畫
          lightbox.classList.remove('hidden');
          setTimeout(() => {
            lightbox.classList.remove('opacity-0');
            lightboxImg.classList.remove('scale-90');
          }, 10);
          
          document.body.classList.add('overflow-hidden');
        });
      });

      // 關閉燈箱功能
      const closeLightbox = () => {
        lightbox.classList.add('opacity-0');
        lightboxImg.classList.add('scale-90');
        
        setTimeout(() => {
          lightbox.classList.add('hidden');
          document.body.classList.remove('overflow-hidden');
        }, 300);
      };

      lightbox.addEventListener('click', closeLightbox);
    });

    // ====== 主題切換 ======
    const themeBtn = document.getElementById("themeToggle");
    function setTheme(dark) {
      if (dark) {
        document.documentElement.classList.add("dark");
        themeBtn.textContent = "☀️"; // ← 提示「點了會切到亮」
        localStorage.setItem("theme", "dark");
      } else {
        document.documentElement.classList.remove("dark");
        themeBtn.textContent = "🌙"; // ← 提示「點了會切到暗」
        localStorage.setItem("theme", "light");
      }
    }
    // 初始化
    setTheme(localStorage.getItem("theme") === "dark");
    themeBtn.addEventListener("click", () => {
      setTheme(!document.documentElement.classList.contains("dark"));
    });


// ====== 語言切換 ======
const langBtn = document.getElementById("langToggle");

function setLang(lang) {
  if (lang === "zh") {
    langBtn.textContent = "EN"; // 按鈕顯示要切換到英文
    document.querySelectorAll(".lang").forEach(el => {
      el.textContent = el.dataset.zh;
    });
    document.querySelectorAll(".lang-zh").forEach(el => el.classList.remove("hidden"));
    document.querySelectorAll(".lang-en").forEach(el => el.classList.add("hidden"));
    localStorage.setItem("lang", "zh");
  } else {
    langBtn.textContent = "中文"; // 按鈕顯示要切換到中文
    document.querySelectorAll(".lang").forEach(el => {
      el.textContent = el.dataset.en;
    });
    document.querySelectorAll(".lang-zh").forEach(el => el.classList.add("hidden"));
    document.querySelectorAll(".lang-en").forEach(el => el.classList.remove("hidden"));
    localStorage.setItem("lang", "en");
  }
}

// 初始化
setLang(localStorage.getItem("lang") || "zh");

// 切換事件
langBtn.addEventListener("click", () => {
  const current = localStorage.getItem("lang") || "zh";
  setLang(current === "zh" ? "en" : "zh");
});




    // ====== 手機版漢堡選單 ======
    const menuBtn = document.getElementById("menuToggle");

      mobileMenu.classList.toggle("hidden");
    });
