            serif: ['Noto Serif TC', 'serif'],

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans TC', sans-serif; }

    section img, .grid-img { cursor: zoom-in; transition: transform 0.3s ease; }

    /* 網格收摺動畫 */

    .rotate-180 { transform: rotate(180deg); }

</head>
<body class="bg-white text-stone-900 dark:bg-slate-800 dark:text-stone-100 transition-colors duration-300">

  <header class="fixed top-0 w-full z-50 bg-stone-50/80 dark:bg-gray-900/80 backdrop-blur-md shadow-sm">
    <nav class="max-w-7xl mx-auto px-6 flex justify-between items-center h-16">
      <a href="testgpt6_g.html" class="text-amber-600 dark:text-indigo-400 font-bold">← 返回設定集</a>
      <h1 class="font-bold">設計草稿 GALLERY</h1>
      <div class="w-10"></div> </nav>
  </header>

  <main class="pt-20">
    <section class="py-20 text-center">
      <h1 class="text-4xl md:text-5xl font-bold text-amber-600 dark:text-indigo-400 serif lang" data-zh="模型製作" data-en="3D Modeling">模型製作</h1>
      <div class="w-16 h-1 bg-amber-600 dark:bg-indigo-400 mx-auto mt-4"></div>
    </section>

    <section class="max-w-5xl mx-auto px-8 flex flex-col md:flex-row items-center gap-10 py-16">
  <div class="w-full md:w-5/12 space-y-4">
    <h2 class="text-3xl font-bold border-l-4 border-amber-600 dark:border-indigo-400 pl-4">Seraphina</h2>
    <p class="text-stone-600 dark:text-stone-300 leading-relaxed">
       這是關於 Seraphina 的模型細節描述。我們將圖片框縮小並加入比例限制，確保在不同螢幕下都能優雅顯示。
    </p>
  </div>
  <div class="w-full md:w-7/12">
    <div class="aspect-[3/2] overflow-hidden rounded-xl shadow-lg border border-stone-100 dark:border-slate-700">
      <img src="webpic/Model01.jpg" alt="Seraphina" class="w-full h-full object-cover">
    </div>
  </div>
</section>

<section class="bg-stone-50 dark:bg-slate-900/50 py-16">
  <div class="max-w-5xl mx-auto px-8 space-y-16">
    <div class="flex flex-col md:flex-row items-center gap-10">
      <div class="w-full md:w-1/2 order-2 md:order-1">
        <h3 class="text-xl font-bold mb-3">拓樸與網格優化</h3>
        <p class="text-stone-600 dark:text-stone-300 text-sm">針對關節處進行了精細的佈線調整，以利後續動畫形變。</p>
      </div>
      <div class="w-full md:w-5/12 order-1 md:order-2">
        <div class="aspect-video overflow-hidden rounded-lg shadow-md">
          <img src="webpic/Topology01.jpg" class="w-full h-full object-cover">
        </div>
      </div>
    </div>
    <div class="flex flex-col md:flex-row items-center gap-10">
      <div class="w-full md:w-5/12">
        <div class="aspect-video overflow-hidden rounded-lg shadow-md">
          <img src="webpic/Texture01.jpg" class="w-full h-full object-cover">
        </div>
      </div>
      <div class="w-full md:w-1/2">
        <h3 class="text-xl font-bold mb-3">材質與貼圖</h3>
        <p class="text-stone-600 dark:text-stone-300 text-sm">使用 PBR 流程確保在任何光影環境下都能保持材質的一致性。</p>
      </div>
    </div>
  </div>
</section>

<section class="max-w-5xl mx-auto px-8 py-16">
  <div class="flex justify-between items-end mb-6">
    <h3 class="text-xl font-bold">更多模型細節</h3>
    <button id="toggleGrid" class="text-amber-600 dark:text-indigo-400 text-sm flex items-center">
      <span id="toggleText">展開所有</span>
      <svg id="arrowIcon" class="w-4 h-4 ml-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
    </button>
  </div>

<div id="grid-container" style="max-height: 0px;" class="opacity-0 transition-all duration-500 ease-in-out">
  <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
      <img src="webpic/Concept01.png" class="grid-img w-full h-40 object-cover rounded shadow-sm border border-stone-100 dark:border-slate-700">
      <img src="webpic/Concept01.png" class="grid-img w-full h-40 object-cover rounded shadow-sm border border-stone-100 dark:border-slate-700">
      <img src="webpic/Concept01.png" class="grid-img w-full h-40 object-cover rounded shadow-sm border border-stone-100 dark:border-slate-700">
      <img src="webpic/Concept01.png" class="grid-img w-full h-40 object-cover rounded shadow-sm border border-stone-100 dark:border-slate-700">
      <img src="webpic/Concept01.png" class="grid-img w-full h-40 object-cover rounded shadow-sm border border-stone-100 dark:border-slate-700">
      <img src="webpic/Concept01.png" class="grid-img w-full h-40 object-cover rounded shadow-sm border border-stone-100 dark:border-slate-700">
    </div>
  </div>
</section>
  </main>

  <div id="image-lightbox" class="fixed inset-0 z-[100] hidden bg-black/90 flex items-center justify-center cursor-zoom-out opacity-0 transition-opacity duration-300">
    <img id="lightbox-img" src="" class="max-w-[90%] max-h-[90%] object-contain rounded-lg scale-90 transition-transform duration-300">
    <button class="absolute top-8 right-8 text-white text-4xl">&times;</button>
  </div>

  <footer class="bg-stone-200 dark:bg-slate-900 py-8 mt-12">
    <div class="max-w-6xl mx-auto px-4 flex flex-col md:flex-row justify-between text-stone-700 dark:text-gray-400">
      <div>
        <h4 class="font-bold mb-2 lang" data-zh="光與塵" data-en="Realm of Division">光與塵</h4>
        <p class="text-sm lang" data-zh="這是一部動畫的官方網站" data-en="This is the official website of the animation">這是一部動畫的官方網站</p>
      </div>
      <div>
        <p class="text-sm">© 2025 光與塵 | Made with ❤️</p>
      </div>
    </div>
  </footer>


  <script>
    // 燈箱功能
    const lightbox = document.getElementById('image-lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const images = document.querySelectorAll('img'); // 選取頁面所有圖片

    images.forEach(img => {
      if(img.id === "lightbox-img") return;
      img.addEventListener('click', () => {
        lightboxImg.src = img.src;
        lightbox.classList.remove('hidden');
        setTimeout(() => {
          lightbox.classList.remove('opacity-0');
          lightboxImg.classList.remove('scale-90');
        }, 10);
        document.body.style.overflow = 'hidden';
      });
    });

    lightbox.addEventListener('click', () => {
      lightbox.classList.add('opacity-0');
      lightboxImg.classList.add('scale-90');
      setTimeout(() => {
        lightbox.classList.add('hidden');
        document.body.style.overflow = 'auto';
      }, 300);
    });

    // 網格收摺功能修正
const toggleBtn = document.getElementById('toggleGrid');
const gridContainer = document.getElementById('grid-container');
const arrowIcon = document.getElementById('arrowIcon');
const toggleText = document.getElementById('toggleText');

toggleBtn.addEventListener('click', () => {
  // 檢查目前是否為收合狀態 (0px)
  if (gridContainer.style.maxHeight === '0px' || gridContainer.style.maxHeight === '') {
    gridContainer.style.maxHeight = '1000px'; // 設定一個足夠大的數值
    gridContainer.classList.remove('opacity-0');
    gridContainer.classList.add('opacity-100');
    toggleText.textContent = '收起';
    arrowIcon.classList.add('rotate-180');
  } else {
    gridContainer.style.maxHeight = '0px';
    gridContainer.classList.remove('opacity-100');
    gridContainer.classList.add('opacity-0');
    toggleText.textContent = '展開所有';
    arrowIcon.classList.remove('rotate-180');
  }
});

    // 主題切換 (簡易版)
    const themeBtn = document.getElementById("themeToggle");
    themeBtn.addEventListener("click", () => {
      document.documentElement.classList.toggle("dark");
    });
  </script>
</body>
</html>
